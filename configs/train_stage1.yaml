model:
  swinir:
    target: stage1_utils.swinir.SwinIR
    params:
      img_size: 64
      patch_size: 1
      in_chans: 3
      embed_dim: 180
      depths: [6, 6, 6, 6, 6, 6, 6, 6]
      num_heads: [6, 6, 6, 6, 6, 6, 6, 6]
      window_size: 8
      mlp_ratio: 2
      sf: 2
      img_range: 1.0
      upsampler: "nearest+conv"
      resi_connection: "1conv"
      unshuffle: True

      unshuffle_scale: 2

dataset:
  train:
    target: stage1_utils.codeformer.CodeformerDataset
    params:
      # training file list path
      file_list: "files_ffhq_128_shuf_train.list"
      file_backend_cfg:
        target: stage1_utils.file_backend.HardDiskBackend
      out_size: 128
      crop_type: center
      blur_kernel_size: 13
      kernel_list: ['iso', 'aniso']
      kernel_prob: [0.5, 0.5]
      blur_sigma: [0.1, 3.0]
      downsample_range: [1, 3]
      noise_range: [0, 15]
      jpeg_range: [30, 100]
  val:
    target: stage1_utils.codeformer.CodeformerDataset
    params:
      # validation file list path
      file_list: "celeba_128_val.list"
      file_backend_cfg:
        target: stage1_utils.file_backend.HardDiskBackend
      out_size: 128
      crop_type: center
      blur_kernel_size: 13
      kernel_list: ['iso', 'aniso']
      kernel_prob: [0.5, 0.5]
      blur_sigma: [0.1, 3.0]
      downsample_range: [1, 3]
      noise_range: [0, 15]
      jpeg_range: [30, 100]

batch_transform:
  target: stage1_utils.batch_transform.IdentityBatchTransform

train:
  # experiment directory path
  exp_dir: "exp_stage1_ffhq_70k"
  learning_rate: 1e-4
  # total batch size
  batch_size: 54
  num_workers: 12
  train_steps: 200000
  log_every: 100
  ckpt_every: 5000
  image_every: 1000
  val_every: 5000
  resume: "exp_stage1_ffhq_70k/checkpoints/0150000.pt"
